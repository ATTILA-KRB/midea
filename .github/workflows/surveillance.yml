name: Surveillance stock PortaSplit

# Surveillance quasi continue sur GitHub Actions.
#
# GitHub n'honore pas les crons rapides (minimum 5 min, en pratique 1 a 3 h de
# retard constate). On utilise donc un job long : boucle_actions.py scanne
# toutes les ~2 min pendant ~58 min, puis le workflow SE RELANCE LUI-MEME
# (etape d'auto-dispatch). Le cron ne sert plus que de filet de secours pour
# redemarrer la chaine si elle casse (crash, maintenance GitHub...).
#
# La cadence par site (2 min direct / 10 min Bright Data / 60 min navigateur)
# se regle dans config.py (champ "intervalle") pour maitriser les couts.

on:
  schedule:
    # Filet de secours uniquement : relance la chaine si elle est morte.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write   # necessaire a l'auto-relance (workflow_dispatch)

# Une seule chaine a la fois : les declenchements en trop restent en attente
# et fusionnent (GitHub ne garde qu'un seul run en attente par groupe).
concurrency:
  group: surveillance-portasplit
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      # Restaure l'etat du cycle precedent. Cle unique par execution + restore-keys
      # par prefixe : on recupere toujours le cache le plus recent, et on en
      # sauvegarde un nouveau a la fin (motif officiel de mise a jour d'un cache).
      - name: Restaurer l'etat precedent
        uses: actions/cache@v4
        with:
          path: state.json
          key: portasplit-state-${{ github.run_id }}
          restore-keys: |
            portasplit-state-

      - name: Boucle de surveillance (~58 min, tick ~2 min)
        env:
          # Identifiants Bright Data (debloque les sites proteges).
          # BRIGHTDATA_API_KEY (cle API du compte) est prioritaire ; a defaut,
          # superproxy avec le mot de passe de zone (BRIGHTDATA_TOKEN).
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_CUSTOMER: ${{ secrets.BRIGHTDATA_CUSTOMER }}
          BRIGHTDATA_TOKEN: ${{ secrets.BRIGHTDATA_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
          # Scraping Browser (Browser API) pour Optimea
          BRIGHTDATA_BROWSER_ZONE: ${{ secrets.BRIGHTDATA_BROWSER_ZONE || 'mcp_browser' }}
          BRIGHTDATA_BROWSER_TOKEN: ${{ secrets.BRIGHTDATA_BROWSER_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERTE_FROM: ${{ secrets.ALERTE_FROM || 'onboarding@resend.dev' }}
          ALERTE_TO: ${{ secrets.ALERTE_TO }}
          # Chemin absolu : evite l'ecueil os.makedirs("") si le chemin est relatif.
          STATE_PATH: ${{ github.workspace }}/state.json
        run: python boucle_actions.py

      # Auto-relance : enchaine immediatement une nouvelle fenetre de 58 min.
      # if: always() pour relancer meme si la boucle a plante.
      - name: Relancer la surveillance
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/surveillance.yml/dispatches" \
            -d '{"ref":"main"}'
