name: Diagnostic Castorama (temporaire)

# Workflow TEMPORAIRE : comprendre pourquoi Castorama est lu "EN STOCK" a tort.
# Lancement manuel uniquement. A supprimer apres analyse.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer le diagnostic
        run: python diag.py
