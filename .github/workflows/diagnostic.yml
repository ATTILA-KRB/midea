name: Test cles Bright Data (temporaire)

# Workflow TEMPORAIRE : valider les nouveaux identifiants Bright Data.
# Lancement manuel. A supprimer apres verification.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Tester les cles
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_CUSTOMER: ${{ secrets.BRIGHTDATA_CUSTOMER }}
          BRIGHTDATA_TOKEN: ${{ secrets.BRIGHTDATA_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
          BRIGHTDATA_BROWSER_ZONE: ${{ secrets.BRIGHTDATA_BROWSER_ZONE || 'mcp_browser' }}
          BRIGHTDATA_BROWSER_TOKEN: ${{ secrets.BRIGHTDATA_BROWSER_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERTE_FROM: ${{ secrets.ALERTE_FROM || 'onboarding@resend.dev' }}
          ALERTE_TO: ${{ secrets.ALERTE_TO }}
        run: python diag.py
