name: Diagnostic Bright Data (temporaire)

# Workflow TEMPORAIRE pour comprendre pourquoi les parsers ne lisent pas le stock
# sur les sites proteges. Lancement manuel uniquement. A supprimer apres analyse.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer le diagnostic
        env:
          BRIGHTDATA_TOKEN: ${{ secrets.BRIGHTDATA_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE || 'web_unlocker1' }}
        run: python diag.py
